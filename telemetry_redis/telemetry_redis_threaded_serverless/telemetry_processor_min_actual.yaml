apiVersion: batch/v1
kind: Job
metadata:
  name: telemetry-processor-${TIMESTAMP}
  namespace: ${NAMESPACE}
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        run: telemetry-processor-${TIMESTAMP}
    spec:
      restartPolicy: Never
      nodeSelector:
        type: pi
      dnsPolicy: ClusterFirst
      containers:
      - name: proc
        image: shemathomas/jsontelemetry_pi_perf_arm_new_stracetrial_serverless:latest
        securityContext:
          allowPrivilegeEscalation: true
          capabilities:
            add: ["SYS_ADMIN","SYS_PTRACE","PERFMON","SYS_RESOURCE","SYS_NICE"]
        resources:
          requests:
            ephemeral-storage: "1Gi"
          limits:
            ephemeral-storage: "1.5Gi"
        env:
          - name: MODE
            value: "${MODE}"
          - name: THREAD_COUNT
            value: "${THREAD_COUNT}"
          - name: RECORDS
            value: "${RECORDS}"
          - name: BATCH_SIZE
            value: "${FILES_TO_GENERATE}"
          - name: REDIS_HOST
            value: "${REDIS_HOST}"
          - name: REDIS_PORT
            value: "${REDIS_PORT}"
          - name: KEY_PATTERN
            value: "telemetry_*"
          - name: CORE_COUNT
            value: "2"
        volumeMounts:
          - name: perfbin
            mountPath: /usr/bin/perf
            readOnly: true
          - name: perfout
            mountPath: /app/data
      volumes:
      - name: perfbin
        hostPath:
          path: /usr/bin/perf
          type: File
      - name: perfout
        hostPath:
          path: /var/log/telemetry-proc
          type: DirectoryOrCreate

