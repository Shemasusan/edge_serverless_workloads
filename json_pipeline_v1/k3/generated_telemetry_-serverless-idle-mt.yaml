apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-container-serverless-idle-mt-deployment
  labels:
    app: telemetry-container-serverless-idle-mt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemetry-container-serverless-idle-mt
  template:
    metadata:
      labels:
        app: telemetry-container-serverless-idle-mt
    spec:
      containers:
        - name: telemetry
          image: shemathomas/jsontelemetry_multi_thread_multi_proc:latest
          ports:
            - containerPort: 8000
          env:
            - name: COUNT
              value: "2000"
            - name: THREADS
              value: "16"
            - name: THREADED
              value: "true"
            - name: MODE
              value: "threaded"
---
apiVersion: v1
kind: Service
metadata:
  name: telemetry-container-serverless-idle-mt-service
  labels:
    app: telemetry-container-serverless-idle-mt
spec:
  selector:
    app: telemetry-container-serverless-idle-mt
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
