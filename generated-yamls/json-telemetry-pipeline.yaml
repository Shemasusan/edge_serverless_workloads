apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-pipeline
  labels:
    app: telemetry-pipeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: telemetry-pipeline
  template:
    metadata:
      labels:
        app: telemetry-pipeline
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"   # change if your metrics endpoint path is different
    spec:
      containers:
        - name: telemetry-pipeline
          image: shemathomas/json-telemetry-pipeline:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: telemetry-pipeline
spec:
  selector:
    app: telemetry-pipeline
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP

